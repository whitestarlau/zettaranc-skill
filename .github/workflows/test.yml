name: Test

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # v2.10.0 观察期：lint 失败不阻塞 PR（v2.11.0 计划改为 required）
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.5.0"

      - name: Lint
        run: ruff check modules/ tests/ --select=F,E,W,UP --ignore=E501,F401,F403 --exit-non-zero-on-fix

      - name: Format check
        run: ruff format --check modules/ tests/

  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # v2.10.0 观察期：SKILL.md 质量门失败不阻塞 PR（v2.11.0 计划改为 required）
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run SKILL.md quality gate
        run: |
          pip install -e . > /dev/null
          python corpus/quality_check.py --json > quality-report.json
          echo "=== quality-report.json ==="
          cat quality-report.json
          echo "=== summary ==="
          python corpus/quality_check.py --strict || true

  e2e-realdata:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # secrets 不能在 job-level if: 用（GitHub Actions 限制）
    # 测试本身有 pytest.mark.skipif 兜底，无 token 时整文件 skip
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .

      - name: Run real data regression (600519.SH × MACD/KDJ/RSI vs stk_factor)
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_API_URL: ${{ secrets.TUSHARE_API_URL }}
        run: |
          pytest tests/test_indicators_realdata.py -v --tb=short

  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # v2.10.0 观察期：失败不阻塞 PR（v2.11.0 再决定）
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure
